name: Playwright Tests

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

  # Daily schedule at 10:00 AM IST (04:30 UTC)
  schedule:
    - cron: '30 4 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      # ✅ Upload JUnit results to AIO Test after execution
      - name: Upload test results to AIO Test
        if: ${{ always() }}
        run: |
          curl -X POST "https://tcms.aiojiraapps.com/aio-tcms/api/v1/project/SCRUM/testcycle/SCRUM-CY-46/import/results?type=JUnit" \
            -H "accept: application/json;charset=utf-8" \
            -H "Authorization: ${{ secrets.AIO_AUTH_TOKEN }}" \
            -H "Content-Type: multipart/form-data" \
            -F "ignoreClassInAutoKey=true" \
            -F "createNewRun=true" \
            -F "updateOnlyRunStatus=true" \
            -F "createCase=false" \
            -F "addCaseToCycle=false" \
            -F "file=@test-results/junit.xml;type=text/xml"

      # Optional: upload Playwright HTML report
      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30